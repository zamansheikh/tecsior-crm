# Tecsior CRM — frontend (Next.js)  →  crm.tecsior.com
# Install on the VPS:
#   sudo cp deploy/nginx/crm.tecsior.com.conf /etc/nginx/sites-available/crm.tecsior.com
#   sudo ln -s /etc/nginx/sites-available/crm.tecsior.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d crm.tecsior.com    # adds the 443 block + redirect

server {
    listen 80;
    listen [::]:80;
    server_name crm.tecsior.com;

    location / {
        proxy_pass http://127.0.0.1:7010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
