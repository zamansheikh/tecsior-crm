# Tecsior CRM — backend (Express API)  →  crmapi.tecsior.com
# Install on the VPS:
#   sudo cp deploy/nginx/crmapi.tecsior.com.conf /etc/nginx/sites-available/crmapi.tecsior.com
#   sudo ln -s /etc/nginx/sites-available/crmapi.tecsior.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d crmapi.tecsior.com   # adds the 443 block + redirect
#
# CORS + the auth cookie are handled by the Express app itself (CORS_ORIGIN
# is set to https://crm.tecsior.com in deploy/ecosystem.config.cjs), so nginx
# only needs to proxy. The cookie is Secure + SameSite=None in production, so
# this host MUST be served over HTTPS (certbot below).

server {
    listen 80;
    listen [::]:80;
    server_name crmapi.tecsior.com;

    # base64 file uploads ride through the API (express limit is 15mb).
    client_max_body_size 16m;

    location / {
        proxy_pass http://127.0.0.1:7011;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
