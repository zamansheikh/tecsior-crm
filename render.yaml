# Render blueprint for the Tecsior API (backend).
# Deploy the frontend on Vercel separately (see DEPLOY.md).
services:
  - type: web
    name: tecsior-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: MONGODB_URI
        sync: false # set in the Render dashboard (secret)
      - key: MONGODB_DB
        value: tecsior
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false # set to your Vercel URL, e.g. https://tecsior.vercel.app
      - key: COOKIE_NAME
        value: tecsior_session
